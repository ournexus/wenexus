# Python Backend Pre-commit Configuration
# FastAPI / AI-ML specific hooks (using uv + ruff)

repos:
  # Ruff for linting and formatting (replaces black, isort, flake8)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.8
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # mypy for type checking
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy src/
        language: system
        files: \.py$
        pass_filenames: false

      # Check for TODO comments
      - id: check-todos
        name: Check for TODO/FIXME comments
        entry: bash -c 'if grep -r "TODO\|FIXME\|XXX" --include="*.py" src/; then echo "❌ TODO/FIXME comments found. Please resolve before committing."; exit 1; fi'
        language: system
        pass_filenames: false

      # pytest check (on push only)
      - id: pytest
        name: Run pytest
        entry: uv run pytest tests/ -q --tb=short
        language: system
        files: \.py$
        pass_filenames: false
        stages: [pre-push]
