# Roundtable 域 — 测试用例
# 覆盖：讨论会话、专家发言、模式切换、共识度

domain: roundtable
feature: 圆桌讨论

cases:
  # ── 讨论会话 ──

  - id: roundtable-001
    name: 创建并启动讨论会话
    priority: P0
    preconditions:
      - 用户已登录
      - 数据库中有话题
    steps:
      - 从话题详情页点击"进入讨论"
      - 在圆桌页面点击"开始讨论"
    expected:
      - 跳转到圆桌讨论页面
      - 讨论状态变为进行中
      - 求真者（fact_checker）最先发言

  - id: roundtable-002
    name: 求真者首先发言并提供事实依据
    priority: P0
    preconditions:
      - 讨论已启动
    steps:
      - 等待第一条消息出现
    expected:
      - 第一条消息来自求真者角色
      - 消息内容非空
      - 消息中包含事实引用或来源标注

  # ── Autopilot 模式 ──

  - id: roundtable-010
    name: Autopilot 模式下专家自动轮流发言
    priority: P0
    preconditions:
      - 讨论已启动
      - 当前为 autopilot 模式
    steps:
      - 等待讨论自动推进
    expected:
      - 多位不同角色的专家依次发言
      - 至少包含 2 种不同角色（如 economist、technologist）
      - 消息按时间顺序排列
      - 后续专家可引用前序发言

  # ── Host 模式 ──

  - id: roundtable-020
    name: 切换到 host 模式
    priority: P0
    preconditions:
      - 讨论正在 autopilot 模式中
    steps:
      - 点击"接管"按钮
    expected:
      - 模式指示器变为 host
      - autopilot 自动发言停止
      - 出现可点名的专家列表

  - id: roundtable-021
    name: Host 模式下点名专家发言
    priority: P0
    preconditions:
      - 当前为 host 模式
    steps:
      - 在专家面板中选择经济学者
    expected:
      - 经济学者生成一条新发言
      - 发言内容与当前讨论上下文相关

  - id: roundtable-022
    name: 从 host 模式恢复 autopilot
    priority: P1
    preconditions:
      - 当前为 host 模式
    steps:
      - 点击"恢复"按钮
    expected:
      - 模式指示器变为 autopilot
      - 讨论恢复自动推进

  # ── 共识度 ──

  - id: roundtable-030
    name: 共识度指标随讨论变化
    priority: P1
    preconditions:
      - 讨论已进行 3+ 轮
    steps:
      - 查看共识度指示器
    expected:
      - 共识度数值在 0-100 范围
      - 随讨论轮次推进有变化

  - id: roundtable-031
    name: 共识度 API 返回正确结构
    priority: P1
    preconditions:
      - 有进行中的讨论 session
    steps:
      - 调用 GET /api/domains/roundtable/sessions/{sessionId}/consensus
    expected:
      - 返回 200
      - 响应包含 level (number, 0-100)
      - 响应包含 agreements 和 disagreements 列表
