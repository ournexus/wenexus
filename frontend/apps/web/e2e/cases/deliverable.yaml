# Deliverable 域 — 测试用例
# 覆盖：就绪度检查、交付物生成、交付物查看

domain: deliverable
feature: 交付物生成

cases:
  # ── 就绪度 ──

  - id: deliverable-001
    name: 讨论不充分时就绪度不足
    priority: P0
    preconditions:
      - 讨论刚启动，消息少于 3 条
    steps:
      - 查看交付物生成按钮状态
    expected:
      - 生成按钮不可用或提示就绪度不足
      - 就绪度分数低于阈值

  - id: deliverable-002
    name: 就绪度 API 返回正确结构
    priority: P0
    preconditions:
      - 有讨论 session
    steps:
      - 调用 GET /api/domains/deliverable/readiness?sessionId={id}
    expected:
      - 返回 200
      - 响应包含 isReady (boolean)
      - 响应包含 readinessScore (number, 0-100)
      - 响应包含 missingElements 列表

  # ── 生成 ──

  - id: deliverable-010
    name: 生成 report 类型交付物
    priority: P0
    preconditions:
      - 讨论已充分进行（5+ 轮）
      - 就绪度达标
    steps:
      - 选择 report 类型
      - 点击生成
    expected:
      - 进入生成中状态
      - 生成完成后跳转到交付物页面
      - 交付物内容为格式化的 markdown 报告
      - 报告内容长度 > 100 字

  - id: deliverable-011
    name: 生成 checklist 类型交付物
    priority: P1
    preconditions:
      - 讨论已充分进行
    steps:
      - 选择 checklist 类型
      - 点击生成
    expected:
      - 生成成功
      - 内容包含列表项格式

  - id: deliverable-012
    name: 无效 session 生成应返回错误
    priority: P1
    preconditions: []
    steps:
      - 调用 POST /api/domains/deliverable/generate，传入不存在的 session_id
    expected:
      - 返回 400 或 404
      - 响应包含错误信息

  # ── 查看 ──

  - id: deliverable-020
    name: 查看已生成的交付物
    priority: P0
    preconditions:
      - 有已生成的交付物
    steps:
      - 访问交付物详情页
    expected:
      - 页面显示交付物标题
      - 页面显示格式化的内容
      - 可以看到生成来源（关联的讨论信息）
