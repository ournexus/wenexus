# Discovery 域 — 测试用例
# 覆盖：话题创建、信息流、话题详情

domain: discovery
feature: 话题管理与信息流

cases:
  # ── 话题创建 ──

  - id: discovery-001
    name: 创建辩论类话题
    priority: P0
    preconditions:
      - 用户已登录
      - 在话题创建页面
    steps:
      - 填写话题标题（如"AI 会取代程序员吗？"）
      - 填写话题描述（不少于 10 字）
      - 选择话题类型为 debate
      - 选择可见性为 public
      - 提交表单
    expected:
      - 表单提交成功，无报错
      - 页面跳转到圆桌讨论页面或话题详情页
      - 新话题出现在话题列表中

  - id: discovery-002
    name: 创建话题 — 表单验证
    priority: P0
    preconditions:
      - 用户已登录
      - 在话题创建页面
    steps:
      - 不填写任何字段，直接提交
    expected:
      - 表单不提交
      - 必填字段旁显示验证提示
      - 页面停留在创建页

  - id: discovery-003
    name: 创建不同类型的话题
    priority: P1
    preconditions:
      - 用户已登录
    steps:
      - 分别创建 debate / brainstorm / analysis / exploration 四种类型话题
    expected:
      - 每种类型都能成功创建
      - 话题列表中正确显示各自类型标签

  # ── 信息流 ──

  - id: discovery-010
    name: 首页展示话题信息流
    priority: P0
    preconditions:
      - 数据库中有种子话题（pnpm db:seed）
    steps:
      - 访问首页
    expected:
      - 页面显示话题卡片列表
      - 每张卡片包含标题和类型信息
      - 卡片可点击进入详情

  - id: discovery-011
    name: 信息流 API 返回正确数据
    priority: P0
    preconditions: []
    steps:
      - 调用 GET /api/domains/discovery/feed
    expected:
      - 返回 200
      - 响应体为数组格式
      - 每个元素包含 id, title 字段

  # ── 话题详情 ──

  - id: discovery-020
    name: 查看话题详情页
    priority: P0
    preconditions:
      - 数据库中有话题
    steps:
      - 在首页点击任意话题卡片
    expected:
      - 跳转到话题详情页
      - 页面显示话题标题和描述
      - 页面包含"进入讨论"的入口
