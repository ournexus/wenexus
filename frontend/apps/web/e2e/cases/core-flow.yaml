# 核心闭环 — 冒烟测试用例
# P0 端到端完整链路

domain: core
feature: 核心业务闭环

cases:
  - id: core-001
    name: 完整链路：创建话题 → AI 讨论 → 生成交付物
    priority: P0
    preconditions:
      - 用户已登录
      - LLM API 可用（OpenRouter key 已配置）
      - 数据库已同步（pnpm db:push）
    steps:
      - 访问首页，确认应用已加载
      - 进入创建话题页面
      - 填写话题信息（标题、描述、类型 debate）并提交
      - 在圆桌页面点击"开始讨论"
      - 等待求真者发言（应包含事实引用）
      - 等待至少 2 位专家发言
      - 点击"生成报告"
      - 验证交付物页面展示格式化报告
    expected:
      - 全链路无错误
      - 求真者第一个发言
      - 至少 2 位不同角色专家发言
      - 报告内容非空且有实质内容

  - id: core-002
    name: 首页可访问性
    priority: P0
    preconditions: []
    steps:
      - 访问首页
    expected:
      - 页面正常渲染（不白屏）
      - 有导航元素
      - 无大量 JS 错误（< 5 个 console.error）
