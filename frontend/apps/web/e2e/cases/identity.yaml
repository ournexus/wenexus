# Identity 域 — 测试用例
# 覆盖：用户偏好、背景收集

domain: identity
feature: 用户身份与偏好

cases:
  - id: identity-001
    name: 偏好 API 基本可用
    priority: P0
    preconditions: []
    steps:
      - 调用 GET /api/domains/identity/preferences
    expected:
      - 未登录时返回 401
      - 已登录时返回 200

  - id: identity-002
    name: 首次进入圆桌显示背景收集弹窗
    priority: P1
    preconditions:
      - 用户已登录
      - 用户未完成 onboarding
    steps:
      - 进入圆桌讨论页面
    expected:
      - 弹出背景收集弹窗
      - 弹窗包含身份选择（Student/Professional/Creator/Curious）
      - 弹窗包含讨论深度选择

  - id: identity-003
    name: 完成背景收集后弹窗不再出现
    priority: P1
    preconditions:
      - 用户已完成 onboarding
    steps:
      - 再次进入圆桌讨论页面
    expected:
      - 弹窗不出现
      - 直接进入讨论

  - id: identity-004
    name: 可跳过背景收集
    priority: P1
    preconditions:
      - 弹窗已显示
    steps:
      - 点击"跳过"
    expected:
      - 弹窗关闭
      - 后续不再出现
